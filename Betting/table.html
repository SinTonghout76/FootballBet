<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bet Records</title>
    <style>
      body {
        background: #f4f6f9;
        font-family: Arial;
      }
      .container {
        width: 90%;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }
      h2 {
        text-align: center;
        margin-bottom: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 17px;
      }
      th {
        background-color: #2c7be5;
        color: white;
        padding: 12px;
      }
      td {
        padding: 10px;
        text-align: center;
      }
      tr:nth-child(even) {
        background-color: #f2f2f2;
      }

      .win {
        background-color: #d4edda !important;
        color: #155724;
        font-weight: bold;
      }
      .lose {
        background-color: #f8d7da !important;
        color: #721c24;
        font-weight: bold;
      }
      .pending {
        background-color: white !important;
        color: black;
        font-weight: normal;
      }

      button {
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin: 2px;
      }
      .edit-btn {
        background: #ffc107;
      }
      .update-btn {
        background: #28a745;
        color: white;
      }
      .delete-btn {
        background: #dc3545;
        color: white;
      }
      .edit-btn:hover,
      .update-btn:hover,
      .delete-btn:hover {
        opacity: 0.8;
      }

      .back-btn {
        margin-top: 20px;
        padding: 10px 20px;
        background: #333;
        color: white;
      }

      #results {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
      }

      select {
        padding: 5px 8px;
        border-radius: 6px;
        font-size: 16px;
      }
      input[type="number"] {
        width: 80px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Bet History</h2>

      <table id="betTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Stake ($)</th>
            <th>Odd</th>
            <th>Total ($)</th>
            <th>To Win ($)</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <div
        style="
          display: flex;
          align-items: center;
          justify-content: space-between;
        "
      >
        <div>
          <button class="back-btn" onclick="goBack()">Add New Bet</button>
          <button
            class="back-btn"
            onclick="exportToExcel()"
            style="background-color: #2ca02c"
          >
            Export to Excel
          </button>
        </div>
        <div id="results">
          Total Win: $0 | Total Lose: $0 | Final Result: $0
        </div>
      </div>
    </div>

    <script>
      let bets = JSON.parse(localStorage.getItem("bets")) || [];
      let tableBody = document.querySelector("#betTable tbody");
      let resultsDiv = document.getElementById("results");

      function renderTable() {
        tableBody.innerHTML = "";
        let totalWin = 0;
        let totalLose = 0;

        bets.forEach((bet, index) => {
          let total = bet.stake * bet.odd;

          let toWin = parseFloat(bet.toWin);
          if (isNaN(toWin)) toWin = 0;

          let status = bet.status || "pending";

          if (status === "win") totalWin += toWin;
          if (status === "lose") totalLose += bet.stake;

          let row = document.createElement("tr");

          row.innerHTML = `
      <td>${bet.date}</td>
      <td class="stake">$${bet.stake.toFixed(2)}</td>
      <td class="odd">${bet.odd}</td>
      <td>$${total.toFixed(2)}</td>
      <td class="toWin">${toWin}</td>
      <td>
        <select onchange="updateStatusDropdown(this, ${index})">
          <option value="pending" ${status === "pending" ? "selected" : ""}>Pending</option>
          <option value="win" ${status === "win" ? "selected" : ""}>Win</option>
          <option value="lose" ${status === "lose" ? "selected" : ""}>Lose</option>
        </select>
      </td>
      <td>
        <button class="edit-btn" onclick="editRow(${index})">Edit</button>
        <button class="update-btn" onclick="updateRow(${index})">Update</button>
        <button class="delete-btn" onclick="deleteRow(${index})">Delete</button>
      </td>
    `;

          row.classList.remove("win", "lose", "pending");
          row.classList.add(status);

          tableBody.appendChild(row);
        });

        let finalResult = totalWin - totalLose;

        resultsDiv.innerHTML =
          `Total Win: <span style="color:orange">$${totalWin.toFixed(2)}</span> | ` +
          `Total Lose: <span style="color:blue">$${totalLose.toFixed(2)}</span> | ` +
          `Final Result: <span style="color:${finalResult >= 0 ? "green" : "red"}">$${finalResult.toFixed(2)}</span>`;
      }

      function updateStatusDropdown(select, index) {
        bets[index].status = select.value;
        localStorage.setItem("bets", JSON.stringify(bets));
        renderTable();
      }

      function deleteRow(index) {
        bets.splice(index, 1);
        localStorage.setItem("bets", JSON.stringify(bets));
        renderTable();
      }

      function editRow(index) {
        let row = tableBody.rows[index];
        row.cells[1].innerHTML = `<input type="number" value="${bets[index].stake}">`;
        row.cells[2].innerHTML = `<input type="number" value="${bets[index].odd}" step="0.01">`;
        row.cells[4].innerHTML = `<input type="number" value="${bets[index].toWin || ""}">`;
      }

      function updateRow(index) {
        let row = tableBody.rows[index];
        let newStake = parseFloat(row.cells[1].querySelector("input").value);
        let newOdd = parseFloat(row.cells[2].querySelector("input").value);
        let newToWin = row.cells[4].querySelector("input").value;
        if (!newStake || !newOdd) {
          alert("Invalid values");
          return;
        }
        bets[index].stake = newStake;
        bets[index].odd = newOdd;
        bets[index].toWin = newToWin;
        localStorage.setItem("bets", JSON.stringify(bets));
        renderTable();
      }

      function goBack() {
        window.location.href = "index.html";
      }

      function exportToExcel() {
        if (bets.length === 0) {
          alert("No data to export!");
          return;
        }
        let csv = "Date,Stake,Odd,Total,To Win,Status\n";
        bets.forEach((bet) => {
          let stake = bet.stake || 0;
          let odd = bet.odd || 0;
          let total = (stake * odd).toFixed(2);
          let toWin = bet.toWin || 0;
          let status = bet.status || "pending";
          let date = bet.date.includes(",") ? `"${bet.date}"` : bet.date;
          csv += `${date},${stake},${odd},${total},${toWin},${status}\n`;
        });
        let blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        let url = URL.createObjectURL(blob);
        let link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "BetHistory.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }

      renderTable();
    </script>
  </body>
</html>
